<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>document.documentElement.classList.add('js');</script>

  <!-- Page Title -->
  <title>Contact • FIERCE</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./styles.css">

  <!-- SEO -->
  <meta name="description" content="Contact the FIERCE program. Reach out with questions or learn more about our community.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">

  <meta property="og:description" content="Building community and support for underrepresented students in computing.">
  <meta property="og:image" content="https://yourdomain.com/preview-image.jpg">

  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="FIERCE Program">
  <meta property="twitter:description" content="Fostering Inclusion by Engaging in Real-World Computing Education.">
</head>

<body>
  <!-- Header -->
  <header class="site-header">
    <div class="nav-container">
      <div class="nav-left">
        <a href="./index.html" class="logo" aria-label="FIERCE Home">
          <span class="logo-media" aria-hidden="true">
            <img
              src="./images/fierce_logo.jpeg"
              alt=""
              class="logo-image"
              decoding="async"
            />
          </span>
          <span class="logo-copy">
            <span class="logo-text">FIERCE</span>
            <span class="logo-tagline">Fostering Inclusion in Computing</span>
          </span>
        </a>
      </div>

      <nav class="nav-center" aria-label="Primary navigation">
        <a href="./index.html" class="nav-link">Home</a>
        <a href="./programming.html" class="nav-link">Events</a>
        <a href="./contact.html" class="nav-link" aria-current="page">Contact</a>
      </nav>

      <div class="nav-right">
        <a href="mailto:contact@example.com" class="cta-button">Email Us</a>
      </div>
    </div>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <h1>Contact</h1>
        <p>We’d love to hear from you. Reach out with any questions.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2>Get in touch</h2>

        <div class="cards contact-grid">
          <div class="card">
            <h3>Email</h3>
            <p>
              <a href="mailto:contact@example.com" class="text-link">
                contact@example.com
              </a>
            </p>
          </div>

          <div class="card">
            <h3>Location</h3>
            <p>Downtown campus · Remote</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> FIERCE Program. All rights reserved.</p>
    </div>
  </footer>

  <script src="./script.js"></script>

</html>
