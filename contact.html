<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact • Spring Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <div class="nav-container">
      <div class="nav-left">
        <a href="./index.html" class="logo" aria-label="Spring Board Home">
          <span class="logo-mark">⛵</span>
          <span class="logo-text">Spring Board</span>
        </a>
      </div>
      <nav class="nav-center" aria-label="Primary">
        <a href="./index.html" class="nav-link" data-page="home">Home</a>
        <a href="./programming.html" class="nav-link" data-page="programming">Programming</a>
        <a href="./contact.html" class="nav-link" data-page="contact">Contact</a>
      </nav>
      <div class="nav-right">
        <a href="mailto:contact@example.com" class="cta-button">Email Us</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" aria-label="Contact">
      <div class="hero-inner">
        <h1>Contact</h1>
        <p>We'd love to hear from you. Reach out with any questions.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2>Get in touch</h2>
        <div class="cards" style="grid-template-columns: repeat(2, minmax(0, 1fr));">
          <div class="card">
            <h3>Email</h3>
            <p><a class="nav-link" href="mailto:contact@example.com">contact@example.com</a></p>
          </div>
          <div class="card">
            <h3>Location</h3>
            <p>Downtown campus + Remote</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> Spring Board. All rights reserved.</p>
    </div>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
